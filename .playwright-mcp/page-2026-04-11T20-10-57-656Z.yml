        - heading "The Render Command" [level=3] [ref=e69]
        - paragraph [ref=e70]:
          - text: The core command for rendering videos is
          - code [ref=e71]: npx remotion render <composition-id>
          - text: . This renders your composition to the default
          - code [ref=e72]: out
          - text: folder as an MP4 file.
      - generic [ref=e73]:
        - generic [ref=e74]: Rule
        - heading "Specifying Output Path" [level=3] [ref=e75]
        - paragraph [ref=e76]:
          - text: "Control where your video is saved by adding an output path:"
          - code [ref=e77]: npx remotion render MyVideo ./output/video.mp4
          - text: . You can also use the
          - code [ref=e78]: "--output"
          - text: flag for clarity.
        - generic [ref=e79]: Remotion CLI Documentation
