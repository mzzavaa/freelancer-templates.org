      - generic [ref=e179]:
        - heading "Quality Settings" [level=2] [ref=e180]
        - paragraph [ref=e181]: Fine-tune video quality, compression, and file size to achieve the perfect balance for your delivery requirements.
    - generic [ref=e182]:
      - generic [ref=e183]:
        - generic [ref=e184]: Rule
        - heading "Constant Rate Factor (CRF)" [level=3] [ref=e185]
        - paragraph [ref=e186]: CRF controls the quality-to-size ratio. Lower values mean higher quality and larger files. The scale is 0-51, with 23 being the default.
        - list [ref=e187]:
          - listitem [ref=e188]: "CRF 18: High quality, larger file"
          - listitem [ref=e189]: "CRF 23: Balanced (default)"
          - listitem [ref=e190]: "CRF 28: Lower quality, smaller file"
        - generic [ref=e191]: FFmpeg CRF Guide
      - generic [ref=e192]:
        - generic [ref=e193]: Tip
        - heading "Setting CRF" [level=3] [ref=e194]
        - paragraph [ref=e195]:
          - text: Use
          - code [ref=e196]: "--crf=18"
          - text: for high-quality renders where file size isn't a concern. For web delivery,
          - code [ref=e197]: "--crf=23"
          - text: offers a good balance.
      - generic [ref=e198]:
        - generic [ref=e199]: This project
        - heading "High Quality Master" [level=3] [ref=e200]
        - paragraph [ref=e201]:
          - text: "Create a high-quality master file:"
          - code [ref=e202]: npx remotion render MyVideo master.mp4 --crf=18 --image-format=png
      - generic [ref=e203]:
        - generic [ref=e204]: Rule
        - heading "Video Bitrate" [level=3] [ref=e205]
        - paragraph [ref=e206]:
          - text: "For precise file size control, use bitrate instead of CRF:"
          - code [ref=e207]: "--video-bitrate=5M"
          - text: for 5 Mbps or
          - code [ref=e208]: "--video-bitrate=2500K"
          - text: for 2.5 Mbps.
        - generic [ref=e209]: Remotion Encoding Guide
      - generic [ref=e210]:
        - generic [ref=e211]: Tip
        - heading "Audio Bitrate" [level=3] [ref=e212]
        - paragraph [ref=e213]:
          - text: Control audio quality with
          - code [ref=e214]: "--audio-bitrate=320k"
          - text: for high quality or
          - code [ref=e215]: "--audio-bitrate=192k"
          - text: for standard quality. Higher bitrates preserve audio fidelity.
      - generic [ref=e216]:
        - generic [ref=e217]: This project
        - heading "Web-Optimized Output" [level=3] [ref=e218]
        - paragraph [ref=e219]:
          - text: "Optimize for web delivery:"
          - code [ref=e220]: npx remotion render MyVideo web.mp4 --codec=h264 --crf=23 --audio-codec=aac --audio-bitrate=192k
