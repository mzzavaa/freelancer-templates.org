        - generic [ref=e58]: Rule
        - 'heading "Minimum body text: 32px at 1280x720" [level=3] [ref=e59]'
        - paragraph [ref=e60]: Broadcast standard requires text to be at least 2% of frame height. At 720px that is 14px - but that assumes a 40-inch TV at 2 meters. For web video watched on a laptop, scale up to 32px minimum for any readable text.
        - generic [ref=e61]: "Scaled from: BBC/EBU broadcast spec (1920x1080 minimum 40px body text)"
      - generic [ref=e62]:
