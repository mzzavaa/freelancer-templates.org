        - heading "Maximum 4 levels of hierarchy per composition" [level=3] [ref=e64]
        - paragraph [ref=e65]: Hero, title, body, caption. Use each level for exactly one purpose. Never use font size to create emphasis inside a single level - use weight or color instead.
        - generic [ref=e66]: "Source: Bringhurst, The Elements of Typographic Style"
