  - generic [ref=e96]:
    - generic [ref=e97]:
      - generic [ref=e98]: "02"
      - generic [ref=e99]:
        - heading "Signal to noise - ruthless reduction" [level=2] [ref=e100]
        - paragraph [ref=e101]: "Edward Tufte's core principle: maximize the ratio of data to ink. Every element that does not add meaning reduces it."
    - generic [ref=e102]:
      - generic [ref=e103]:
        - heading "One idea per scene" [level=3] [ref=e104]
        - paragraph [ref=e105]: If a viewer needs to read two things at once, they read neither. Each scene should answer exactly one question. If you have two points, use two scenes with a cut.
        - list [ref=e106]:
          - listitem [ref=e107]: One headline per frame - not a list of bullets
          - listitem [ref=e108]: One number per stat card - not a dashboard
          - listitem [ref=e109]: One action in the CTA - not "choose one of these"
      - generic [ref=e110]:
        - heading "Remove decoration, keep structure" [level=3] [ref=e111]
        - paragraph [ref=e112]: Background textures, gradient overlays, drop shadows, and decorative borders are noise. Grid lines on charts are signal. Safe zones and consistent margins are signal. Animated blobs are noise.
        - list [ref=e113]:
          - listitem [ref=e114]: "Background grids: use at 4-8% opacity maximum"
          - listitem [ref=e115]: "Drop shadows: only when showing depth is the point"
          - listitem [ref=e116]: "Borders on cards: 1px at 20-30% opacity"
      - generic [ref=e117]:
        - heading "Negative space is content" [level=3] [ref=e118]
        - paragraph [ref=e119]: A frame with 40% empty space reads as confident. A frame with 90% text reads as a document. For 1280x720, leave at least 80px safe zones on all sides and never fill more than 65% of the frame with content.
      - generic [ref=e120]:
        - heading "Consistent margins = visual trust" [level=3] [ref=e121]
        - paragraph [ref=e122]: Use the same padding value across every scene in a composition. Random-feeling spacing signals amateur work. This project uses PADDING=80 left/right and TOP_SAFE=48 - always use these constants, never hardcode.
  - generic [ref=e124]:
    - generic [ref=e125]:
      - generic [ref=e126]: "03"
      - generic [ref=e127]:
        - heading "Color - contrast and purpose" [level=2] [ref=e128]
        - paragraph [ref=e129]: "Color has one job in a video: direct attention. Every color that is not directing attention is competing with the ones that are."
    - generic [ref=e130]:
      - generic [ref=e131]:
        - generic [ref=e132]: Rule
        - heading "4.5:1 contrast ratio minimum for all text" [level=3] [ref=e133]
        - paragraph [ref=e134]: WCAG AA requires 4.5:1 for body text. This is also the threshold for text to read cleanly when video is compressed (H.264 compression amplifies low-contrast artifacts).
        - generic [ref=e135]: WCAG 2.1 Level AA / YouTube compression artifacts study, 2019
      - generic [ref=e136]:
        - generic [ref=e137]: Rule
        - heading "One accent color, one supporting color" [level=3] [ref=e138]
        - paragraph [ref=e139]: Your accent is the "look here" color - used only for the most important element per scene. Supporting color is for secondary labels. Background and text are neutrals. Four colors maximum on screen at once.
      - generic [ref=e140]:
        - generic [ref=e141]: Rule
        - heading "Never use color alone to convey meaning" [level=3] [ref=e142]
        - paragraph [ref=e143]: 8% of men have color blindness. Use shape + color for status indicators, labels + color for categories, and icon + color for actions. A red warning badge must also say "Error" - the red alone is not enough.
  - generic [ref=e145]:
    - generic [ref=e146]:
      - generic [ref=e147]: "04"
      - generic [ref=e148]:
        - heading "Animation - purpose, not decoration" [level=2] [ref=e149]
        - paragraph [ref=e150]: Every animation should direct focus, show a relationship, or give the viewer time to process information. If it does none of these, remove it.
    - generic [ref=e151]:
      - generic [ref=e152]:
        - 'heading "Entrance timing: 0.3-0.6 seconds" [level=3] [ref=e153]'
        - paragraph [ref=e154]: "At 30fps: 9-18 frames. Faster than 9 frames (0.3s) and elements \"pop in\" - viewers miss the movement. Slower than 18 frames (0.6s) and viewers feel like they are waiting. This project's DUR.fast=9 and DUR.normal=18 hit these exactly."
      - generic [ref=e155]:
        - 'heading "Stagger: 15-25 frames between items" [level=3] [ref=e156]'
        - paragraph [ref=e157]: When animating a list, stagger each item by half a second maximum. Longer staggers make a 4-item list feel like a 10-second video about nothing. Use staggerDelay() from animations.ts with 15-25 frame offsets.
      - generic [ref=e158]:
        - heading "Spring physics feel more natural than easing" [level=3] [ref=e159]
        - paragraph [ref=e160]: CSS ease-out is fine for simple fades. For translations and scales, spring physics (mass, stiffness, damping) feel physically real because they model how objects actually decelerate. This is why Remotion's useSpring is better than interpolate for entrances.
      - generic [ref=e161]:
        - heading "Idle frames = breathing room" [level=3] [ref=e162]
        - paragraph [ref=e163]: After all items have animated in, leave 30-60 idle frames (1-2 seconds) before the composition ends. This is when viewers actually read and retain the content. Cutting to black immediately after the last animation = zero retention.
  - generic [ref=e165]:
    - generic [ref=e166]:
      - generic [ref=e167]: "05"
      - generic [ref=e168]:
        - heading "Layout - visual hierarchy drives the eye" [level=2] [ref=e169]
        - paragraph [ref=e170]: The eye enters a frame at the top-left and scans in a Z-pattern. Design your layout to match that path.
    - generic [ref=e171]:
      - generic [ref=e172]:
        - heading "F-pattern for data-heavy layouts" [level=3] [ref=e173]
        - paragraph [ref=e174]: The strongest position is top-left. Primary headline here. Secondary information goes on the second horizontal "stroke" of the F. Supporting details and stats fill the vertical "stem". Use BackgroundGrid to reinforce this structure visually.
      - generic [ref=e175]:
        - heading "Cards must be content-sized, not frame-filling" [level=3] [ref=e176]
        - paragraph [ref=e177]: Never use flex:1 or align-stretch on card grids. Cards should be as tall as their content plus consistent padding. A 32px label in a 120px card is a layout error. Use alignContent:"start" on grid containers so rows wrap to content height.
      - generic [ref=e178]:
        - 'heading "Grid columns: 2-3 maximum" [level=3] [ref=e179]'
        - paragraph [ref=e180]: A 4-column grid at 1280px gives each column 280px after margins. At TYPE.body (32px), you can fit about 8-10 words per line. That is correct. Never go to 5+ columns - text wraps to 2-3 words per line which is unreadable.
