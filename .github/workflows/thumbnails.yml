name: Generate template thumbnails

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'all = render all compositions, changed = only changed templates'
        required: false
        default: 'changed'
        type: choice
        options: [all, changed]

permissions:
  contents: read

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure

      - name: Generate thumbnails (changed templates)
        if: inputs.mode == 'changed'
        run: bash scripts/generate-thumbnails.sh --changed

      - name: Generate thumbnails (all)
        if: inputs.mode == 'all'
        run: bash scripts/generate-thumbnails.sh

      - name: Upload previews artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: template-previews
          path: |
            static/previews/showcase/
            static/previews/hero/
          retention-days: 7
