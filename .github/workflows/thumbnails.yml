name: Generate template thumbnails

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'all = render all compositions, changed = only changed templates'
        required: false
        default: 'changed'
        type: choice
        options: [all, changed]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  thumbnails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure --log=error

      - name: Resolve composition IDs
        id: ids
        env:
          RENDER_MODE: ${{ inputs.mode }}
        run: |
          if [[ "$RENDER_MODE" == "all" ]]; then
            IDS=$(python3 -c "
          import json
          with open('data/templates.json') as f:
            data = json.load(f)
          for t in data:
            for v in t.get('variants', []):
              print(v['id'])
          ")
          else
            IDS=$(python3 - <<'PYEOF'
          import json, subprocess, os
          changed = subprocess.run(
            ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
            capture_output=True, text=True
          ).stdout.splitlines()
          root_or_json_changed = any(
            f in ('src/remotion/Root.tsx', 'data/templates.json')
            for f in changed
          )
          slugs = set()
          for f in changed:
            if f.startswith('src/remotion/templates/'):
              slugs.add(f.removeprefix('src/remotion/templates/').split('/')[0])
            if f.startswith('src/remotion/GameDay/'):
              slugs.add('communitygameday')
          with open('data/templates.json') as f:
            data = json.load(f)
          ids = []
          for t in data:
            for v in t.get('variants', []):
              vid = v['id']
              if t['slug'] in slugs:
                ids.append(vid)
              elif root_or_json_changed:
                png = f"static/previews/showcase/{vid}.png"
                if not os.path.exists(png):
                  ids.append(vid)
          if not ids:
            raise SystemExit(0)
          for i in ids:
            print(i)
          PYEOF
            ) || true
          fi
          echo "ids<<EOF" >> "$GITHUB_OUTPUT"
          echo "$IDS"    >> "$GITHUB_OUTPUT"
          echo "EOF"     >> "$GITHUB_OUTPUT"

      - name: Render thumbnails
        if: steps.ids.outputs.ids != ''
        env:
          COMP_IDS: ${{ steps.ids.outputs.ids }}
        run: |
          mkdir -p static/previews/showcase static/previews/hero
          while IFS= read -r id; do
            [[ -z "$id" ]] && continue
            echo "  rendering: $id"
            npx remotion still src/remotion/index.ts "$id" \
              "static/previews/showcase/${id}.png" \
              --frame=60 --overwrite --log=error \
              || echo "  WARN: still failed for $id"
            npx remotion render src/remotion/index.ts "$id" \
              "static/previews/hero/${id}.mp4" \
              --frames=0-59 --codec=h264 --overwrite --log=error \
              || echo "  WARN: render failed for $id"
          done <<< "$COMP_IDS"

      - name: Upload previews artifact
        if: steps.ids.outputs.ids != ''
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: template-previews
          path: |
            static/previews/showcase/
            static/previews/hero/
          retention-days: 7
