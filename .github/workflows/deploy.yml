name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.124.0
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb
          sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            player/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Chrome for Remotion
        run: npx remotion browser ensure --log=error

      - name: Generate thumbnails for changed templates
        run: |
          IDS=$(python3 - <<'PYEOF'
          import json, subprocess, os

          changed = subprocess.run(
            ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD'],
            capture_output=True, text=True
          ).stdout.splitlines()

          # If Root.tsx or templates.json changed, also render any variant
          # that does not yet have a preview image on disk.
          root_or_json_changed = any(
            f in ('src/remotion/Root.tsx', 'data/templates.json')
            for f in changed
          )

          slugs = set()
          for f in changed:
            if f.startswith('src/remotion/templates/'):
              slugs.add(f.removeprefix('src/remotion/templates/').split('/')[0])
            if f.startswith('src/remotion/GameDay/'):
              slugs.add('communitygameday')

          with open('data/templates.json') as f:
            data = json.load(f)

          ids = []
          for t in data:
            for v in t.get('variants', []):
              vid = v['id']
              if t['slug'] in slugs:
                ids.append(vid)
              elif root_or_json_changed:
                png = f"static/previews/showcase/{vid}.png"
                if not os.path.exists(png):
                  ids.append(vid)

          if not ids:
            raise SystemExit(0)
          for i in ids:
            print(i)
          PYEOF
          ) || true

          if [[ -z "$IDS" ]]; then
            echo "No template changes — skipping thumbnail generation."
            exit 0
          fi

          mkdir -p static/previews/showcase static/previews/hero
          while IFS= read -r id; do
            [[ -z "$id" ]] && continue
            echo "  rendering: $id"
            npx remotion still src/remotion/index.ts "$id" \
              "static/previews/showcase/${id}.png" \
              --frame=60 --overwrite --log=error \
              || echo "  WARN: still failed for $id"
            npx remotion render src/remotion/index.ts "$id" \
              "static/previews/hero/${id}.mp4" \
              --frames=0-59 --codec=h264 --overwrite --log=error \
              || echo "  WARN: render failed for $id"
          done <<< "$IDS"

      - name: Install player dependencies
        run: cd player && npm ci

      - name: Build Remotion player
        run: cd player && npm run build

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          HUGO_BASEURL: ${{ steps.pages.outputs.base_url }}
        run: hugo --gc --minify --baseURL "${HUGO_BASEURL}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ./public

  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
